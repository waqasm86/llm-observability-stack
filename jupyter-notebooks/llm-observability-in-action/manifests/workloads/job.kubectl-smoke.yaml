apiVersion: batch/v1
kind: Job
metadata:
  name: kubectl-smoke
  namespace: llm-observability
  labels:
    app.kubernetes.io/name: llm-observability-in-action
    app.kubernetes.io/component: smoke-job
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-observability-in-action
    spec:
      restartPolicy: Never
      containers:
        - name: smoke
          image: bitnami/kubectl:1.31
          command:
            - /bin/sh
            - -lc
            - |
              set -e
              echo "namespace=${K8S_NAMESPACE:-llm-observability}"
              kubectl get pods -n llm-observability
              kubectl get svc -n llm-observability
