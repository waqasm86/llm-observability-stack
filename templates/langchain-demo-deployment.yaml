{{- if .Values.langchainDemo.enabled }}
{{- $langsmithConfigured := and .Values.langsmith.enabled (or (ne (trim .Values.langsmith.apiKey) "") (ne (trim .Values.langsmith.existingSecret) "")) -}}
{{- $langsmithTracing := and $langsmithConfigured (default false .Values.langsmith.tracing) -}}
{{- $probes := .Values.langchainDemo.probes | default dict -}}
{{- $startupProbe := get $probes "startup" | default dict -}}
{{- $readinessProbe := get $probes "readiness" | default dict -}}
{{- $livenessProbe := get $probes "liveness" | default dict -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langchain-demo
  namespace: {{ include "llm-observability-stack.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langchain-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langchain-demo
    spec:
      containers:
        - name: app
          image: {{ .Values.langchainDemo.image.repository }}:{{ .Values.langchainDemo.image.tag }}
          imagePullPolicy: {{ .Values.langchainDemo.image.pullPolicy }}
          workingDir: /app
          command:
            - python
            - -m
            - uvicorn
            - app:app
            - --host
            - {{ .Values.langchainDemo.app.host | quote }}
            - --port
            - {{ .Values.langchainDemo.app.port | quote }}
            - --workers
            - {{ .Values.langchainDemo.app.workers | quote }}
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: OLLAMA_UPSTREAM_BASE_URL
              value: http://ollama:11434
            - name: OLLAMA_MODEL
              value: {{ .Values.ollamaModel.name | quote }}
            - name: OLLAMA_PROXY_PATH_PREFIX
              value: "/ollama"
            - name: OLLAMA_PROXY_TRACE_LANGSMITH
              value: {{ ternary "true" "false" $langsmithTracing | quote }}
            - name: OLLAMA_PROXY_TIMEOUT_SECONDS
              value: "180"
            - name: LANGSMITH_TRACING
              value: {{ ternary "true" "false" $langsmithTracing | quote }}
            - name: LANGCHAIN_TRACING_V2
              value: {{ ternary "true" "false" $langsmithTracing | quote }}
            - name: LANGSMITH_ENDPOINT
              value: {{ .Values.langsmith.endpoint | quote }}
            - name: LANGCHAIN_ENDPOINT
              value: {{ .Values.langsmith.endpoint | quote }}
            - name: LANGSMITH_PROJECT
              value: {{ .Values.langsmith.project | quote }}
            - name: LANGCHAIN_PROJECT
              value: {{ .Values.langsmith.project | quote }}
{{- if .Values.etcd.enabled }}
            - name: ETCD_ENDPOINTS
              value: http://{{ include "llm-observability-stack.etcdFullname" . }}:{{ .Values.etcd.service.clientPort }}
{{- end }}
{{- if $langsmithConfigured }}
            - name: LANGSMITH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "llm-observability-stack.langsmithSecretName" . }}
                  key: {{ .Values.langsmith.existingSecretKey }}
            - name: LANGCHAIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "llm-observability-stack.langsmithSecretName" . }}
                  key: {{ .Values.langsmith.existingSecretKey }}
{{- end }}
{{- range .Values.langchainDemo.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
{{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.langchainDemo.app.port }}
          resources:
{{ toYaml .Values.langchainDemo.resources | indent 12 }}
{{- if (default true (get $startupProbe "enabled")) }}
          startupProbe:
            httpGet:
              path: {{ default "/healthz" (get $startupProbe "path") }}
              port: http
            initialDelaySeconds: {{ default 30 (get $startupProbe "initialDelaySeconds") }}
            periodSeconds: {{ default 10 (get $startupProbe "periodSeconds") }}
            timeoutSeconds: {{ default 3 (get $startupProbe "timeoutSeconds") }}
            failureThreshold: {{ default 60 (get $startupProbe "failureThreshold") }}
{{- end }}
{{- if (default true (get $readinessProbe "enabled")) }}
          readinessProbe:
            httpGet:
              path: {{ default "/healthz" (get $readinessProbe "path") }}
              port: http
            initialDelaySeconds: {{ default 20 (get $readinessProbe "initialDelaySeconds") }}
            periodSeconds: {{ default 10 (get $readinessProbe "periodSeconds") }}
            timeoutSeconds: {{ default 3 (get $readinessProbe "timeoutSeconds") }}
            failureThreshold: {{ default 6 (get $readinessProbe "failureThreshold") }}
{{- end }}
{{- if (default true (get $livenessProbe "enabled")) }}
          livenessProbe:
            httpGet:
              path: {{ default "/healthz" (get $livenessProbe "path") }}
              port: http
            initialDelaySeconds: {{ default 60 (get $livenessProbe "initialDelaySeconds") }}
            periodSeconds: {{ default 20 (get $livenessProbe "periodSeconds") }}
            timeoutSeconds: {{ default 3 (get $livenessProbe "timeoutSeconds") }}
            failureThreshold: {{ default 6 (get $livenessProbe "failureThreshold") }}
{{- end }}
{{- if .Values.langchainDemo.appFromConfigMap.enabled }}
          volumeMounts:
            - name: app-code
              mountPath: /app/app.py
              subPath: app.py
              readOnly: true
      volumes:
        - name: app-code
          configMap:
            name: langchain-demo-app
{{- end }}
{{- end }}
