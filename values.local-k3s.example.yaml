namespace:
  create: false
  name: llm-observability

nvidia:
  runtimeClassName: nvidia
  # This host uses NVIDIA MPS sharing. Keep per-pod GPU request at 1.
  # Runtime logs currently show failRequestsGreaterThanOne=true for the plugin.
  gpuResourceName: nvidia.com/gpu.shared
  gpuCount: 1

langsmith:
  tracing: true
  project: k3s-ollama-gemma-local
  apiKey: "replace-me"

ollamaModel:
  name: gemma3-1b-it-gguf-local
  gguf:
    enabled: true
    hostPath: /media/waqasm86/External1/Project-Nvidia-Office/models
    filename: gemma-3-1b-it-gguf.gguf
    mountPath: /models/gguf
  modelfile:
    content: |
      FROM __GGUF_PATH__
      TEMPLATE """{{- $systemPromptAdded := false }}
      {{- range $i, $_ := .Messages }}
      {{- $last := eq (len (slice $.Messages $i)) 1 }}
      {{- if eq .Role "user" }}<start_of_turn>user
      {{- if (and (not $systemPromptAdded) $.System) }}
      {{- $systemPromptAdded = true }}
      {{ $.System }}
      {{ end }}
      {{ .Content }}<end_of_turn>
      {{ if $last }}<start_of_turn>model
      {{ end }}
      {{- else if eq .Role "assistant" }}<start_of_turn>model
      {{ .Content }}{{ if not $last }}<end_of_turn>
      {{ end }}
      {{- end }}
      {{- end }}"""
      PARAMETER min_p 0.01
      PARAMETER repeat_penalty 1
      PARAMETER top_k 64
      PARAMETER top_p 0.95
      PARAMETER num_predict 32768
      PARAMETER stop <end_of_turn>
      PARAMETER stop <eos>
      PARAMETER temperature 1
      PARAMETER num_ctx 1024

ollama:
  runtimeClassName: nvidia
  image:
    repository: ollama/ollama
    tag: 0.17.7
    pullPolicy: IfNotPresent
  ollama:
    gpu:
      enabled: true
      type: nvidia
      number: 1
      nvidiaResource: nvidia.com/gpu.shared
    models:
      create:
        - name: gemma3-1b-it-gguf-local
          configMapRef: ollama-local-modelfile
          configMapKeyRef: Modelfile
  persistentVolume:
    enabled: true
    size: 20Gi
    storageClass: local-path
  service:
    type: LoadBalancer
    port: 11434
  volumeMounts:
    - name: local-gguf-model
      mountPath: /models/gguf
      readOnly: true
  volumes:
    - name: local-gguf-model
      hostPath:
        path: /media/waqasm86/External1/Project-Nvidia-Office/models
        type: Directory

langchainDemo:
  image:
    repository: langchain-demo
    tag: 0.1.1
    pullPolicy: IfNotPresent
  app:
    workers: 2
  probes:
    startup:
      timeoutSeconds: 3
      failureThreshold: 60
    readiness:
      timeoutSeconds: 3
      failureThreshold: 6
    liveness:
      initialDelaySeconds: 60
      timeoutSeconds: 3
      failureThreshold: 6
  appFromConfigMap:
    enabled: true
  service:
    type: LoadBalancer
    port: 8000

etcd:
  enabled: false

openWebUI:
  ollamaBaseUrl: http://langchain-demo:8000/ollama
  webuiSecretKey: "replace-with-a-32-plus-char-secret"
  service:
    type: LoadBalancer
    port: 8080

open-webui:
  webuiSecret:
    enabled: true
    # Leave empty to use chart-managed secret name (`open-webui-secrets`).
    existingSecretName: ""
    existingSecretKey: WEBUI_SECRET_KEY
  service:
    type: LoadBalancer
    port: 8080
    containerPort: 8080
  ollamaUrls:
    - http://langchain-demo:8000/ollama
  extraEnvVars:
    - name: OLLAMA_BASE_URL
      value: http://langchain-demo:8000/ollama
    - name: ENABLE_PERSISTENT_CONFIG
      value: "False"
    - name: WEBUI_AUTH
      value: "False"

pythonToolbox:
  enabled: true
  image:
    repository: python-toolbox
    tag: 0.2.0
    pullPolicy: IfNotPresent
  command:
    - sleep
    - infinity

langsmithDashboardSeeder:
  enabled: false
