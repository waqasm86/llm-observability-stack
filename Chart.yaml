apiVersion: v2
name: llm-observability-stack
description: |
  Kubernetes-native EdgeLLM observability and benchmarking stack for private GGUF/NVIDIA
  LLM inference on Linux edge devices, laptops, workstations, and small GPU clusters.
  Includes Ollama, Open WebUI, LangChain/LangSmith-compatible proxying, Prometheus metrics,
  Grafana dashboards, blackbox probes, benchmark artifacts, and NVIDIA/DCGM-ready integrations.
type: application
version: 0.2.0
appVersion: "1.1.0"
kubeVersion: ">=1.27.0-0"
home: https://github.com/waqasm86/llm-observability-stack
sources:
  - https://github.com/prometheus-community/helm-charts
  - https://docs.nvidia.com/datacenter/cloud-native/gpu-operator/latest/
  - https://github.com/otwld/ollama-helm
  - https://github.com/open-webui/helm-charts
maintainers:
  - name: Mohammad Waqas
annotations:
  category: ai-machine-learning
keywords:
  - edge-ai
  - edgellm
  - llm-observability
  - nvidia
  - k3s
  - ollama
  - gguf
  - prometheus
  - grafana
  - dcgm
  - langchain
  - langsmith
dependencies:
  - name: ollama
    version: 1.50.0
    repository: file://charts/ollama
    condition: ollama.enabled
  - name: open-webui
    version: 12.10.0
    repository: file://charts/open-webui
    condition: openWebUI.enabled
