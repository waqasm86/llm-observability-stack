apiVersion: v2
name: llm-observability-stack
description: |
  Opinionated local k3s stack for NVIDIA GPU + Ollama + Open WebUI + LangChain/LangSmith.
  The dependency charts are vendored locally to reduce external repository drift.
type: application
version: 0.1.0
appVersion: "1.0.0"
kubeVersion: ">=1.27.0-0"
home: https://github.com/waqasm86/llm-observability-stack
sources:
  - https://github.com/otwld/ollama-helm
  - https://github.com/open-webui/helm-charts
maintainers:
  - name: Mohammad Waqas
annotations:
  category: ai-machine-learning
dependencies:
  - name: ollama
    version: 1.50.0
    repository: file://charts/ollama
    condition: ollama.enabled
  - name: open-webui
    version: 12.10.0
    repository: file://charts/open-webui
    condition: openWebUI.enabled
